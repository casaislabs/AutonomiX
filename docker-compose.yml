services:
  backend:
    container_name: autonomix-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: autonomix-backend:latest
    init: true
    restart: unless-stopped
    stop_grace_period: 10s
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
